<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Моя музика</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      text-align: center;
      margin: 0;
      background: #f5f5f5;
      padding: 40px 16px;
    }

    .container {
      max-width: 700px;
      margin: 0 auto;
    }

    .song {
      background: #fff;
      padding: 20px;
      margin: 15px 0;
      border-radius: 10px;
      box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
    }

    button {
      padding: 12px 25px;
      font-size: 16px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
    }

    .download {
      background: #4caf50;
      color: #fff;
    }

    .download:disabled {
      background: #9e9e9e;
      cursor: not-allowed;
    }

    .donate {
      display: inline-block;
      background: #000;
      color: #fff;
      margin: 8px;
      text-decoration: none;
      padding: 12px 25px;
      font-size: 16px;
      border-radius: 8px;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Моя AI музика</h1>
    <p>Скачування безкоштовне, але можете підтримати автора.</p>

    <a class="donate" href="https://www.privat24.ua/send/iz2bk" target="_blank" rel="noopener noreferrer">Підтримати через Приват Банк</a>

    <a class="donate" href="https://send.monobank.ua/jar/3BSnRdBti2" target="_blank" rel="noopener noreferrer">Підтримати через Monobank</a>

    <div id="songs"></div>
  </div>

  <script>
    const songs = [
      {
        title: 'ZVUKA Music UA "Глас Небес" - Потужна пісня про незламний дух України',
        file: 'zvukamusicua - ZVUKA Music UA -Глас Небес-.mp3'
      },
      {
        title: 'Вчора приснився сон прекрасний - пісня-мрія кожного українця | ZVUKA Music UA',
        file: 'Вчора приснився сон прекрасний —.mp3'
      },
      {
        title: 'Мій заповіт',
        file: 'Мій заповіт.mp3'
      },
      {
        title: 'Незламні',
        file: 'Незламні.mp3'
      },
      {
        title: 'Тіні війни',
        file: 'Тіні війни.mp3'
      }
    ];

    const REMOTE_MUSIC_BASE_URL = 'https://raw.githubusercontent.com/download-music/zvukamusicua/main/music/';

    function getSongDownloadKey(fileName) {
      return `downloaded:${encodeURIComponent(fileName)}`;
    }

    function hasDownloadedSong(fileName) {
      return localStorage.getItem(getSongDownloadKey(fileName)) === 'true';
    }

    function markSongDownloaded(fileName) {
      localStorage.setItem(getSongDownloadKey(fileName), 'true');
    }

    function setButtonAsDownloaded(button) {
      button.disabled = true;
      button.textContent = 'Вже скачано';
    }

    function triggerDownload(url, fileName) {
      const link = document.createElement('a');
      link.href = url;
      link.download = fileName;
      document.body.appendChild(link);
      link.click();
      link.remove();
    }

    function buildSourceFileUrl(fileName) {
      const encodedFileName = encodeURIComponent(fileName);
      if (window.location.protocol === 'file:') {
        return `${REMOTE_MUSIC_BASE_URL}${encodedFileName}`;
      }
      return `music/${encodedFileName}`;
    }

    async function downloadSong(fileName, button) {
      if (hasDownloadedSong(fileName)) {
        setButtonAsDownloaded(button);
        alert('Цю пісню вже було скачано. Повторне скачування недоступне.');
        return;
      }

      button.disabled = true;
      button.textContent = 'Завантаження...';

      try {
        const fileUrl = buildSourceFileUrl(fileName);
        const response = await fetch(fileUrl);

        if (!response.ok) {
          throw new Error('Не вдалося отримати файл.');
        }

        const fileBuffer = await response.arrayBuffer();
        // Use octet-stream to reduce chance of browser opening audio inline.
        const blob = new Blob([fileBuffer], { type: 'application/octet-stream' });
        const objectUrl = URL.createObjectURL(blob);

        triggerDownload(objectUrl, fileName);

        setTimeout(() => URL.revokeObjectURL(objectUrl), 1000);
        markSongDownloaded(fileName);
        setButtonAsDownloaded(button);
      } catch (error) {
        button.disabled = false;
        button.textContent = 'Скачати';
        alert('Помилка завантаження. Перевірте інтернет і наявність файлу в репозиторії.');
      }
    }

    const songsContainer = document.getElementById('songs');

    songs.forEach((song) => {
      const songBlock = document.createElement('div');
      songBlock.className = 'song';

      const title = document.createElement('h3');
      title.textContent = song.title;

      const button = document.createElement('button');
      button.className = 'download';
      button.type = 'button';
      button.textContent = hasDownloadedSong(song.file) ? 'Вже скачано' : 'Скачати';
      button.disabled = hasDownloadedSong(song.file);
      button.addEventListener('click', () => downloadSong(song.file, button));

      songBlock.appendChild(title);
      songBlock.appendChild(button);
      songsContainer.appendChild(songBlock);
    });
  </script>
</body>
</html>
