<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ZVUKA Music UA</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      text-align: center;
      margin: 0;
      background: #f5f5f5;
      padding: 40px 16px;
    }

    .container {
      max-width: 700px;
      margin: 0 auto;
    }

    .song {
      background: #fff;
      padding: 20px;
      margin: 15px 0;
      border-radius: 10px;
      box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
    }

    button {
      padding: 12px 25px;
      font-size: 16px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
    }

    .download {
      background: #4caf50;
      color: #fff;
    }

    .download:disabled {
      background: #9e9e9e;
      cursor: not-allowed;
    }

    .donate {
      display: inline-block;
      background: #000;
      color: #fff;
      margin: 8px;
      text-decoration: none;
      padding: 12px 25px;
      font-size: 16px;
      border-radius: 8px;
    }

    .hint {
      margin: 16px auto;
      max-width: 700px;
      background: #fff7e6;
      border: 1px solid #ffd591;
      border-radius: 10px;
      padding: 12px;
      color: #5c3b00;
    }

    .hint button {
      margin-top: 10px;
      background: #d97706;
      color: #fff;
    }

    .socials {
      margin: 16px 0 22px;
      background: #fff;
      border-radius: 10px;
      padding: 14px;
      box-shadow: 0 0 10px rgba(0, 0, 0, 0.08);
    }

    .socials a {
      display: inline-block;
      margin: 6px 10px;
      color: #0f766e;
      font-weight: 700;
      text-decoration: none;
    }

    .socials a:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>ZVUKA Music UA</h1>
    <p>Скачування безкоштовне, але можете підтримати автора.</p>

    <div class="socials">
      <strong>Слухайте та підписуйтесь:</strong><br>
      <a href="https://www.youtube.com/@zvuka_music" target="_blank" rel="noopener noreferrer">YouTube: @zvuka_music</a>
      <a href="https://www.instagram.com/zvuka_music/" target="_blank" rel="noopener noreferrer">Instagram: @zvuka_music</a>
    </div>

    <a class="donate" href="https://www.privat24.ua/send/iz2bk" target="_blank" rel="noopener noreferrer">Підтримати через Приват Банк</a>

    <a class="donate" href="https://send.monobank.ua/jar/3BSnRdBti2" target="_blank" rel="noopener noreferrer">Підтримати через Monobank</a>

    <div id="browserHint" class="hint" hidden></div>

    <div id="songs"></div>
  </div>

  <script>
    const songs = [
      {
        title: 'Глас Небес',
        file: 'zvukamusicua - ZVUKA Music UA -Глас Небес-.mp3'
      },
      {
        title: 'Вчора приснився сон прекрасний',
        file: 'Вчора приснився сон прекрасний —.mp3'
      },
      {
        title: 'Мій Заповіт',
        file: 'Мій заповіт.mp3'
      },
      {
        title: 'Незламні',
        file: 'Незламні.mp3'
      },
      {
        title: 'Тіні Війни',
        file: 'Тіні війни.mp3'
      }
    ];

    const REMOTE_MUSIC_BASE_URL = 'https://raw.githubusercontent.com/download-music/zvukamusicua/main/music/';
    const EMBEDDED_BROWSER_MARKERS = ['Instagram', 'FBAN', 'FBAV', 'FB_IAB', 'Line', 'Twitter'];

    function isEmbeddedBrowser() {
      const userAgent = navigator.userAgent || '';
      const hasKnownMarker = EMBEDDED_BROWSER_MARKERS.some((marker) => userAgent.includes(marker));
      const isAndroidWebView = /Android/i.test(userAgent) && /\bwv\b/i.test(userAgent);
      return hasKnownMarker || isAndroidWebView;
    }

    function openInExternalBrowser() {
      const currentUrl = window.location.href;

      if (/Android/i.test(navigator.userAgent) && /^https?:\/\//i.test(currentUrl)) {
        const hostAndPath = currentUrl.replace(/^https?:\/\//i, '');
        window.location.href = `intent://${hostAndPath}#Intent;scheme=https;package=com.android.chrome;end`;
        return;
      }

      window.open(currentUrl, '_blank', 'noopener,noreferrer');
    }

    function renderEmbeddedBrowserHint() {
      if (!isEmbeddedBrowser()) {
        return;
      }

      const hint = document.getElementById('browserHint');
      hint.hidden = false;
      hint.innerHTML = '<strong>Вбудований браузер:</strong> у Instagram/Facebook скачування може блокуватись. Відкрийте сторінку у Chrome/Safari для стабільного завантаження.';

      const openButton = document.createElement('button');
      openButton.type = 'button';
      openButton.textContent = 'Відкрити у зовнішньому браузері';
      openButton.addEventListener('click', openInExternalBrowser);
      hint.appendChild(document.createElement('br'));
      hint.appendChild(openButton);
    }

    function triggerDownload(url, fileName) {
      const link = document.createElement('a');
      link.href = url;
      link.download = fileName;
      document.body.appendChild(link);
      link.click();
      link.remove();
    }

    function buildSourceFileUrl(fileName) {
      const encodedFileName = encodeURIComponent(fileName);
      if (window.location.protocol === 'file:') {
        return `${REMOTE_MUSIC_BASE_URL}${encodedFileName}`;
      }
      return `music/${encodedFileName}`;
    }

    async function downloadSong(fileName, button) {
      button.disabled = true;
      button.textContent = 'Завантаження...';

      try {
        const fileUrl = buildSourceFileUrl(fileName);
        const response = await fetch(fileUrl);

        if (!response.ok) {
          throw new Error('Не вдалося отримати файл.');
        }

        const fileBuffer = await response.arrayBuffer();
        // Use octet-stream to reduce chance of browser opening audio inline.
        const blob = new Blob([fileBuffer], { type: 'application/octet-stream' });
        const objectUrl = URL.createObjectURL(blob);

        triggerDownload(objectUrl, fileName);

        setTimeout(() => URL.revokeObjectURL(objectUrl), 1000);
        button.disabled = false;
        button.textContent = 'Скачати';
      } catch (error) {
        button.disabled = false;
        button.textContent = 'Скачати';

        if (isEmbeddedBrowser()) {
          alert('Вбудований браузер блокує автоматичне скачування. Натисніть "Відкрити у зовнішньому браузері" і повторіть завантаження.');
        } else {
          alert('Помилка завантаження. Перевірте інтернет і наявність файлу в репозиторії.');
        }
      }
    }

    const songsContainer = document.getElementById('songs');

    songs.forEach((song) => {
      const songBlock = document.createElement('div');
      songBlock.className = 'song';

      const title = document.createElement('h3');
      title.textContent = song.title;

      const button = document.createElement('button');
      button.className = 'download';
      button.type = 'button';
      button.textContent = 'Скачати';
      button.addEventListener('click', () => downloadSong(song.file, button));

      songBlock.appendChild(title);
      songBlock.appendChild(button);
      songsContainer.appendChild(songBlock);
    });

    renderEmbeddedBrowserHint();
  </script>
</body>
</html>
